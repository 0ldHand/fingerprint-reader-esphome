esphome:
  name: fingerprint-reader
  friendly_name: Fingerprint Reader
  # ================== EXTERNAL ANTENNA ==================
  on_boot:
    priority: 650
    then:
      - output.turn_off: rf_switch_enable
      - delay: 150ms
      - output.turn_on: rf_antenna_select
      - wifi.disable:
      - delay: 100ms
      - wifi.enable:

# ================== EXTERNAL ANTENNA (Outputs) ==================
output:
  - platform: gpio
    pin: GPIO3
    id: rf_switch_enable

  - platform: gpio
    pin: GPIO14
    id: rf_antenna_select

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf



uart:
  id: fingerprint_uart
  rx_pin: GPIO17
  tx_pin: GPIO16
  baud_rate: 57600

fingerprint_grow:
  # Sensing pin (blue wire) - must stay enabled
  sensing_pin:
    number: GPIO2
    

  # Power control - Only switching the Red wire (VCC)
  sensor_power_pin:
    number: GPIO19          # D8 - Good GPIO
    inverted: true

  idle_period_to_sleep: 15s   # Sensor sleeps after 15 seconds of inactivity

  # ================== LED & EVENT FEEDBACK ==================
  on_finger_scan_matched:
    - fingerprint_grow.aura_led_control:
        state: FLASHING
        color: GREEN
        speed: 50
        count: 4
    - homeassistant.event:
        event: esphome.finger_scan_matched
        data:
          finger_id: !lambda 'return finger_id;'
          confidence: !lambda 'return confidence;'

  on_finger_scan_unmatched:
    - fingerprint_grow.aura_led_control:
        state: FLASHING
        color: RED
        speed: 100
        count: 6
    - homeassistant.event:
        event: esphome.finger_scan_unmatched

  on_finger_scan_misplaced:
    - homeassistant.event:
        event: esphome.frontdoor_finger_scan_misplaced

  on_finger_scan_invalid:
    - homeassistant.event:
        event: esphome.finger_scan_invalid



  on_enrollment_scan:
    - fingerprint_grow.aura_led_control:
        state: FLASHING
        color: BLUE
        speed: 125
        count: 2    
    - homeassistant.event:
        event: esphome.enrollment_scan
        data:
          finger_id: !lambda 'return finger_id;'
          scan_num: !lambda 'return scan_num;'

  on_enrollment_done:
    - fingerprint_grow.aura_led_control:
        state: FLASHING
        color: BLUE
        speed: 75
        count: 4
    - homeassistant.event:
        event: esphome.enrollment_done
        data:
          finger_id: !lambda 'return finger_id;'

  on_enrollment_failed:
    - homeassistant.event:
        event: esphome.enrollment_failed
        data:
          finger_id: !lambda 'return finger_id;'

sensor:
  - platform: fingerprint_grow
    fingerprint_count:
      name: "Stored Fingerprints"
    last_finger_id:
      name: "Last Scanned Finger ID"
    last_confidence:
      name: "Last Scan Confidence"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    icon: mdi:wifi


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 19.5dB

api:
  encryption:
    key: !secret api_encryption_key

  actions:
    - action: enroll
      variables:
        finger_id: int
        num_scans: int
      then:
        - fingerprint_grow.aura_led_control:
            state: ALWAYS_ON
            color: PURPLE
            speed: 0
            count: 0
        - delay: 400ms
        - fingerprint_grow.enroll:
            finger_id: !lambda 'return finger_id;'
            num_scans: !lambda 'return num_scans;'

    - action: cancel_enroll
      then:
        - fingerprint_grow.cancel_enroll:

    - action: delete
      variables:
        finger_id: int
      then:
        - fingerprint_grow.delete:
            finger_id: !lambda 'return finger_id;'

    - action: delete_all
      then:
        - fingerprint_grow.delete_all:

ota:
  - platform: esphome

logger:
  baud_rate: 0
